syntax = "proto3";

package agent.v1;

option go_package = "play-ground/software_acrh/master_worker/api/proto/agent/v1;agentv1";

// AgentService defines the communication interface between the Agent and the Master server.
service AgentService {
  // Register allows an Agent to register with the Master using a registration token.
  // This is typically the first step before establishing a persistent connection.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // ConnectTunnel establishes a bidirectional streaming connection between the Agent and the Server.
  // The Agent continuously sends status reports, while the Server sends commands in real time.
  rpc ConnectTunnel(stream ConnectTunnelRequest) returns (stream ConnectTunnelResponse);
}

// RegisterRequest is sent by the Agent to authenticate and register itself with the Master.
message RegisterRequest {
  string registration_token = 1; // Token issued from the UI for agent registration
  string agent_version = 2; // Agent software version (e.g., v1.0.0)
  string k8s_version = 3; // Kubernetes version running on the node (e.g., v1.28.2)
  string hostname = 4; // Hostname or node name where the Agent is running
}

// RegisterResponse contains the result of the registration process.
message RegisterResponse {
  string cluster_id = 1; // Unique identifier of the cluster after successful authentication
  string agent_identity = 2; // Identity token or certificate used for future authenticated connections
  string message = 3; // Human-readable message (e.g., "Registration successful")
}

// AgentReport is sent by the Agent to report its current status and metrics.
message ConnectTunnelRequest {
  string cluster_id = 1; // Cluster identifier associated with this Agent
  string status = 2; // Current agent status (e.g., "ONLINE", "BUSY")
  bytes metrics = 3; // Encoded metrics data (JSON or Protobuf containing node/GPU information)
  string trace_id = 4; // Trace identifier for request tracking and debugging
}

// ConnectTunnelResponse is sent by the Server to instruct the Agent to perform an action.
message ConnectTunnelResponse {
  string command_id = 1; // Unique command identifier (usually UUID) for request-response matching
  string action = 2; // Command type (e.g., "DEPLOY_MODEL", "RESTART_POD")
  bytes payload = 3; // Command payload (typically YAML or JSON configuration)
  string trace_id = 4; // Trace identifier to correlate with Agent reports
}